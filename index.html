<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CONCRETRACK • Hub</title>
  
  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#15416F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- anti-cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="icon" href="./static/img/logo-128.png">
  <link rel="stylesheet" href="./static/css/theme.css">
  <script src="./static/js/template-config.js"></script>
  <script src="./static/js/app.js"></script>
  <script src="./static/js/clock.js" defer></script>
</head>

<body>
  <div id="headerSlot" data-include="./frontend/shared/header.html"></div>

  <main class="page-section shell">
    <section id="modulos">
      <div class="section-heading">
        <div>
          <h2>Aplicativos da Usina</h2>
          <p>Acesso centralizado aos módulos de controle operacional.</p>
        </div>
      </div>
      <div class="module-grid" id="moduleGrid"></div>
    </section>
  </main>

  <div id="footerSlot" data-include="./frontend/shared/footer.html"></div>

  <script>
  /* Registra o SW unificado na raiz */
  (async function(){
    try{
      if ("serviceWorker" in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) {
          if (r.scope !== new URL("./", location.href).href) {
            await r.unregister();
          }
        }
        await navigator.serviceWorker.register("./sw.js", { scope: "./" });
      }
    }catch(e){ console.error("SW:", e); }
  })();
  </script>
</body>
</html>
